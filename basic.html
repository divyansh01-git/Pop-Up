<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My First Popup</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    
    <button class="open-btn">Open PopUp</button>
    <div class="overlay"></div>
    <div class="popup">
        <h2>Hello People!!</h2>
        <p>This is a PopUp.</p>
        <p>If you don't agree, Close it.</p>
        <button class="close-btn">Close PopUp</button>
    </div>
    
    <script src="script.js"></script>

</body>

</html>
